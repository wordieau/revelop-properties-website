name: PR Quality Checks

on:
  pull_request:
    branches: [ main, staging, develop ]

jobs:
  # Job 1: PHP syntax check
  php-lint:
    name: PHP Lint
    if: vars.ENABLE_PHP_LINT == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint PHP files
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  # Job 2: WordPress Coding Standards (PHP_CodeSniffer)
  phpcs:
    name: PHP Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=WordPress .

  # Job 3: PHPStan static analysis
  phpstan:
    name: PHP Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=1G

  # Job 4: JavaScript and CSS linting (using @wordpress/scripts)
  js-css-lint:
    name: JS/CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint JavaScript
        run: npm run lint:js
      - name: Lint CSS
        run: npm run lint:css

  # Job 5: Theme Check (using WP-CLI)
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: wp-cli
      - name: Install Theme Check plugin
        run: wp plugin install theme-check --activate
      - name: Run Theme Check on all themes
        run: |
          for theme in wp-content/themes/*; do
            if [ -d "$theme" ]; then
              echo "Checking theme: $theme"
              wp theme-check --theme="$theme"
            fi
          done
